name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push tag and create release

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history so we can check for tags

      - name: 🏷️ Get Version from Pubspec
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -n1 | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 🔍 Check if Tag Exists
        id: check_tag
        run: |
          TAG="v${{ env.VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist. Proceeding with release."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: ✍️ Create and Push Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="v${{ env.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          # Push tag using custom token if provided, fallback to default GITHUB_TOKEN.
          # Note: Pushing with default GITHUB_TOKEN will NOT trigger subsequent workflows (publish.yml).
          # To trigger publish.yml automatically, define secrets.RELEASE_TOKEN (a Personal Access Token)
          # in your repository secrets.
          if [ -n "${{ secrets.RELEASE_TOKEN }}" ]; then
            git push https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }} "$TAG"
          else
            git push origin "$TAG"
          fi

      - name: 🚀 Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
